<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --bg-card: #17171a;
    --bg-hover: #1e1e23;
    --border: rgba(255,255,255,0.07);
    --border-active: rgba(255,255,255,0.15);
    --text-primary: #f0f0f2;
    --text-secondary: #8a8a96;
    --text-muted: #55555e;
    --accent: #7c6af7;
    --accent-light: rgba(124, 106, 247, 0.12);
    --accent-glow: rgba(124, 106, 247, 0.25);
    --green: #3ecf8e;
    --green-light: rgba(62, 207, 142, 0.1);
    --amber: #f5a623;
    --amber-light: rgba(245, 166, 35, 0.1);
    --red: #f56565;
    --red-light: rgba(245, 101, 101, 0.1);
    --radius: 12px;
    --radius-sm: 8px;
    --font: 'Inter', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Header */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 2rem 0 1.5rem;
    position: sticky;
    top: 0;
    background: rgba(15,15,17,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .header-inner {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .header-left { display: flex; flex-direction: column; gap: 2px; }
  .header-eyebrow { font-size: 11px; font-weight: 500; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; font-family: var(--mono); }
  .header-title { font-size: 20px; font-weight: 600; color: var(--text-primary); }

  .total-progress-wrap { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; min-width: 180px; }
  .total-progress-label { font-size: 12px; color: var(--text-secondary); display: flex; justify-content: space-between; width: 100%; }
  .total-bar { width: 180px; height: 6px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; }
  .total-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #a78bfa); border-radius: 99px; transition: width 0.5s ease; }
  .total-pct { font-size: 18px; font-weight: 600; color: var(--accent); font-family: var(--mono); }

  /* Main layout */
  .main { max-width: 860px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

  /* Legend */
  .legend { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* Section */
  .section { margin-bottom: 1.5rem; }
  .section-header {
    display: flex; align-items: center; gap: 12px;
    padding: 1.1rem 1.25rem;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    user-select: none;
  }
  .section-header:hover { border-color: var(--border-active); background: var(--bg-hover); }
  .section-header.open { border-radius: var(--radius) var(--radius) 0 0; border-bottom-color: transparent; }

  .section-num { font-family: var(--mono); font-size: 12px; color: var(--text-muted); min-width: 20px; }
  .section-title { font-size: 15px; font-weight: 500; flex: 1; }
  .section-meta { display: flex; align-items: center; gap: 10px; }
  .section-pct { font-family: var(--mono); font-size: 12px; color: var(--text-secondary); min-width: 32px; text-align: right; }
  .section-bar-wrap { width: 80px; height: 4px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; }
  .section-bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }
  .chevron { color: var(--text-muted); font-size: 12px; transition: transform 0.25s; }
  .section-header.open .chevron { transform: rotate(180deg); }

  /* Body */
  .section-body {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    overflow: hidden;
    display: none;
  }
  .section-body.open { display: block; }

  /* Requirement item */
  .req-item { border-bottom: 1px solid var(--border); padding: 1.25rem 1.25rem 1.25rem 1.5rem; }
  .req-item:last-child { border-bottom: none; }

  .req-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 0.6rem; }
  .req-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
  .req-content { flex: 1; }
  .req-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .req-name { font-size: 14px; font-weight: 500; }
  .badge { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; white-space: nowrap; font-family: var(--mono); }
  .badge-have { background: var(--green-light); color: var(--green); }
  .badge-grow { background: var(--amber-light); color: var(--amber); }
  .badge-gap { background: var(--red-light); color: var(--red); }

  .req-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.55; margin-bottom: 0.75rem; }

  /* Subtasks */
  .subtasks { display: flex; flex-direction: column; gap: 5px; margin-bottom: 0.75rem; }
  .subtask { display: flex; align-items: flex-start; gap: 8px; }
  .subtask-check {
    width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border-active);
    flex-shrink: 0; margin-top: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, border-color 0.2s; background: transparent;
  }
  .subtask-check.checked { background: var(--accent); border-color: var(--accent); }
  .subtask-check.checked::after { content: '✓'; font-size: 10px; color: #fff; font-weight: 600; }
  .subtask-label { font-size: 12px; color: var(--text-secondary); line-height: 1.5; cursor: pointer; }
  .subtask-label.checked { color: var(--text-muted); text-decoration: line-through; }

  /* Progress bar per item */
  .req-progress { display: flex; align-items: center; gap: 8px; margin-bottom: 0.75rem; }
  .req-bar-wrap { flex: 1; height: 3px; background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden; }
  .req-bar-fill { height: 100%; border-radius: 99px; transition: width 0.3s ease; }
  .req-bar-pct { font-family: var(--mono); font-size: 11px; color: var(--text-muted); min-width: 28px; text-align: right; }

  /* Links */
  .links-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; font-family: var(--mono); margin-bottom: 5px; }
  .links { display: flex; flex-wrap: wrap; gap: 6px; }
  .link-tag {
    font-size: 12px; padding: 4px 10px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); color: var(--text-secondary);
    text-decoration: none; transition: border-color 0.2s, color 0.2s, background 0.2s;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .link-tag:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .link-tag::before { content: '↗'; font-size: 10px; }

  /* Note from user */
  .user-note {
    background: var(--accent-light);
    border: 1px solid var(--accent-glow);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-size: 12px;
    color: #a78bfa;
    margin-bottom: 0.75rem;
    display: flex; gap: 6px; align-items: flex-start;
  }
  .user-note-icon { flex-shrink: 0; margin-top: 1px; }

  /* Reset button */
  .reset-btn {
    background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text-muted); font-size: 12px; padding: 6px 12px; cursor: pointer;
    font-family: var(--font); transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--red); color: var(--red); }

  @media (max-width: 600px) {
    .header-inner { flex-direction: column; align-items: flex-start; }
    .total-progress-wrap { align-items: flex-start; }
    .section-bar-wrap { width: 50px; }
    .req-title-row { gap: 6px; }
  }
</style>
</head>

const STORAGE_KEY = 'pd_roadmap_v2';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

let state = loadState();

function getSubtaskKey(sectionId, itemId, idx) {
  return `${sectionId}__${itemId}__${idx}`;
}

function countChecked(sectionId, itemId, count) {
  let n = 0;
  for (let i = 0; i < count; i++) {
    if (state[getSubtaskKey(sectionId, itemId, i)]) n++;
  }
  return n;
}

function totalAll() {
  let total = 0, done = 0;
  data.forEach(sec => {
    sec.items.forEach(item => {
      total += item.subtasks.length;
      done += countChecked(sec.id, item.id, item.subtasks.length);
    });
  });
  return { total, done };
}

function updateTotals() {
  const { total, done } = totalAll();
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('totalPct').textContent = pct + '%';
  document.getElementById('totalBar').style.width = pct + '%';
}

function getStatusBadge(status) {
  if (status === 'have') return '<span class="badge badge-have">есть</span>';
  if (status === 'grow') return '<span class="badge badge-grow">развить</span>';
  return '<span class="badge badge-gap">освоить</span>';
}
function getStatusColor(status) {
  if (status === 'have') return 'var(--green)';
  if (status === 'grow') return 'var(--amber)';
  return 'var(--red)';
}

function renderSection(sec) {
  const sectionDiv = document.createElement('div');
  sectionDiv.className = 'section';
  sectionDiv.id = 'sec_' + sec.id;

  let totalItems = 0, doneItems = 0;
  sec.items.forEach(item => {
    totalItems += item.subtasks.length;
    doneItems += countChecked(sec.id, item.id, item.subtasks.length);
  });
  const secPct = totalItems ? Math.round(doneItems / totalItems * 100) : 0;

  const header = document.createElement('div');
  header.className = 'section-header';
  header.innerHTML = `
    <span class="section-num">${String(data.indexOf(sec) + 1).padStart(2,'0')}</span>
    <span class="section-title">${sec.title}</span>
    <span class="section-meta">
      <span class="section-pct" id="secpct_${sec.id}">${secPct}%</span>
      <div class="section-bar-wrap">
        <div class="section-bar-fill" id="secbar_${sec.id}" style="width:${secPct}%; background:${sec.color}"></div>
      </div>
      <span class="chevron">▼</span>
    </span>
  `;
  header.addEventListener('click', () => {
    header.classList.toggle('open');
    body.classList.toggle('open');
  });

  const body = document.createElement('div');
  body.className = 'section-body';

  sec.items.forEach(item => {
    const checked = countChecked(sec.id, item.id, item.subtasks.length);
    const pct = item.subtasks.length ? Math.round(checked / item.subtasks.length * 100) : 0;
    const barColor = getStatusColor(item.status);

    const itemDiv = document.createElement('div');
    itemDiv.className = 'req-item';
    itemDiv.id = `item_${sec.id}_${item.id}`;

    let noteHtml = '';
    if (item.note) {
      noteHtml = `<div class="user-note"><span class="user-note-icon">✏️</span><span>${item.note}</span></div>`;
    }

    let subtasksHtml = item.subtasks.map((st, idx) => {
      const key = getSubtaskKey(sec.id, item.id, idx);
      const isChecked = !!state[key];
      return `<div class="subtask">
        <div class="subtask-check${isChecked ? ' checked' : ''}" data-key="${key}" data-sec="${sec.id}" data-item="${item.id}"></div>
        <span class="subtask-label${isChecked ? ' checked' : ''}" data-key="${key}">${st}</span>
      </div>`;
    }).join('');

    let linksHtml = item.links.map(l =>
      `<a class="link-tag" href="${l.url}" target="_blank" rel="noopener">${l.label}</a>`
    ).join('');

    itemDiv.innerHTML = `
      <div class="req-top">
        <div class="req-status" style="background:${barColor}"></div>
        <div class="req-content">
          <div class="req-title-row">
            <span class="req-name">${item.name}</span>
            ${getStatusBadge(item.status)}
          </div>
          <p class="req-desc">${item.desc}</p>
          ${noteHtml}
          <div class="req-progress">
            <div class="req-bar-wrap"><div class="req-bar-fill" id="bar_${sec.id}_${item.id}" style="width:${pct}%; background:${barColor}"></div></div>
            <span class="req-bar-pct" id="pct_${sec.id}_${item.id}">${pct}%</span>
          </div>
          <div class="subtasks">${subtasksHtml}</div>
          <div class="links-label">Материалы для изучения</div>
          <div class="links">${linksHtml}</div>
        </div>
      </div>
    `;

    body.appendChild(itemDiv);
  });

  body.addEventListener('click', (e) => {
    const check = e.target.closest('.subtask-check');
    const label = e.target.closest('.subtask-label');
    const key = check?.dataset.key || label?.dataset.key;
    if (!key) return;

    const checkEl = body.querySelector(`.subtask-check[data-key="${key}"]`);
    const labelEl = body.querySelector(`.subtask-label[data-key="${key}"]`);
    if (!checkEl) return;

    const secId = checkEl.dataset.sec;
    const itemId = checkEl.dataset.item;

    state[key] = !state[key];
    saveState(state);

    checkEl.classList.toggle('checked', state[key]);
    labelEl.classList.toggle('checked', state[key]);

    // update item bar
    const secObj = data.find(s => s.id === secId);
    const itemObj = secObj?.items.find(i => i.id === itemId);
    if (itemObj) {
      const c = countChecked(secId, itemId, itemObj.subtasks.length);
      const p = itemObj.subtasks.length ? Math.round(c / itemObj.subtasks.length * 100) : 0;
      document.getElementById(`bar_${secId}_${itemId}`).style.width = p + '%';
      document.getElementById(`pct_${secId}_${itemId}`).textContent = p + '%';
    }

    // update section bar
    if (secObj) {
      let tot = 0, dn = 0;
      secObj.items.forEach(it => { tot += it.subtasks.length; dn += countChecked(secId, it.id, it.subtasks.length); });
      const sp = tot ? Math.round(dn / tot * 100) : 0;
      document.getElementById(`secbar_${secId}`).style.width = sp + '%';
      document.getElementById(`secpct_${secId}`).textContent = sp + '%';
    }

    updateTotals();
  });

  sectionDiv.appendChild(header);
  sectionDiv.appendChild(body);
  return sectionDiv;
}

function resetAll() {
  if (!confirm('Сбросить весь прогресс?')) return;
  state = {};
  saveState(state);
  document.getElementById('sections').innerHTML = '';
  init();
}

function init() {
  const container = document.getElementById('sections');
  data.forEach(sec => container.appendChild(renderSection(sec)));
  updateTotals();
}

init();
</script>
